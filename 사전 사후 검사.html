<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시각 반응 사전-사후 검사 프로그램 (정밀 기록형)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 30px; text-align: center; color: #333; }
        h1 { margin-bottom: 30px; color: #2c3e50; }
        .nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .nav button { padding: 15px 30px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; background-color: #e0e6ed; color: #d35400; transition: 0.3s; }
        .nav button:hover { background-color: #dcdde1; }
        .nav button.active { background-color: #d35400; color: white; box-shadow: 0 4px 6px rgba(211, 84, 0, 0.3); }
        .tab-content { display: none; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; min-height: 450px; position: relative; }
        .tab-content.active { display: block; }
        .desc { font-size: 15px; color: #7f8c8d; margin-bottom: 20px; line-height: 1.5; }
        .status-bar { font-size: 18px; font-weight: bold; margin: 20px 0; color: #34495e; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        #reaction-area { width: 100%; height: 250px; background-color: #3498db; border-radius: 12px; margin-top: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-size: 24px; font-weight: bold; cursor: pointer; transition: background-color 0.1s; user-select: none; }
        .state-wait { background-color: #e74c3c !important; }
        .state-go { background-color: #2ecc71 !important; }
        .state-finish { background-color: #9b59b6 !important; cursor: default; }
        #reaction-subtext { font-size: 16px; font-weight: normal; margin-top: 10px; opacity: 0.8; }
        #search-target-display { font-size: 28px; font-weight: bold; color: #e74c3c; margin: 15px 0; padding: 10px 20px; background: #fff0ed; border: 2px solid #ffcfc5; border-radius: 50px; display: inline-block; }
        #search-grid { display: grid; grid-template-columns: repeat(6, 60px); gap: 10px; justify-content: center; margin-top: 20px; }
        .search-cell { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; background-color: #f8f9fa; border: 2px solid #ced4da; border-radius: 8px; cursor: pointer; user-select: none; transition: 0.1s; }
        .search-cell:active { transform: scale(0.9); background-color: #ffcccc; }
        .btn-start { padding: 12px 30px; font-size: 17px; font-weight: bold; cursor: pointer; background-color: #2c3e50; color: white; border: none; border-radius: 8px; margin-top: 10px; transition: 0.2s; }
        .btn-start:hover { background-color: #34495e; transform: translateY(-2px); }
        .btn-start:disabled { background-color: #95a5a6; cursor: not-allowed; transform: none; }
        .result-highlight { color: #e74c3c; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>시각 반응 능력 검사 (정밀 기록형)</h1>

    <div class="nav">
        <button class="tab-btn active" onclick="openTab('tab-reaction', this)">검사 1. 시각 반응 속도</button>
        <button class="tab-btn" onclick="openTab('tab-search', this)">검사 2. 시각 탐색 과제 (30초)</button>
    </div>

    <div id="tab-reaction" class="tab-content active">
        <h2>1. 단순 시각 반응 검사 (7회 측정)</h2>
        <p class="desc">색상이 <b>초록색으로 변하면</b> 최대한 빨리 클릭하세요.<br>총 7번 측정하여 평균 반응 시간을 기록합니다.</p>
        
        <div class="status-bar" id="reaction-result">진행 상황: 0 / 7</div>
        
        <div id="reaction-area" onclick="handleReactionClick()">
            <div id="reaction-maintext">시작하려면 여기를 클릭하세요.</div>
            <div id="reaction-subtext"></div>
        </div>
    </div>

    <div id="tab-search" class="tab-content">
        <h2>2. 시각 탐색 과제 (30초)</h2>
        <p class="desc">제시된 <b>목표</b>를 아래 표에서 최대한 빨리 찾아 클릭하세요.<br>30초 동안 <b>정답 수, 오류 수, 평균 탐색 시간</b>을 측정합니다.</p>
        
        <button class="btn-start" id="btn-search" onclick="startSearchTest()">검사 시작하기</button>
        
        <div class="status-bar" id="search-status">
            정답: 0 | 오류: 0 | 남은 시간: 30초
        </div>
        
        <div id="search-target-display" style="display: none;">찾을 목표: <span id="target-char">?</span></div>
        <div id="search-grid"></div>
    </div>

    <script>
        function openTab(tabId, btn) {
            resetReactionTest();
            resetSearchTest();
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // 검사 1. 시각 반응 속도 로직 (변경 없음)
        let reactionState = 'idle', reactionTimeout, reactionStartTime, trialCount = 0;
        const maxTrials = 7;
        let reactionTimes = [];
        
        const reactionArea = document.getElementById('reaction-area');
        const reactionMainText = document.getElementById('reaction-maintext');
        const reactionSubText = document.getElementById('reaction-subtext');
        const reactionResult = document.getElementById('reaction-result');

        function resetReactionTest() {
            clearTimeout(reactionTimeout); reactionState = 'idle'; trialCount = 0; reactionTimes = [];
            reactionArea.className = ''; reactionMainText.innerText = '시작하려면 여기를 클릭하세요.';
            reactionSubText.innerText = ''; reactionResult.innerText = `진행 상황: 0 / ${maxTrials}`;
        }

        function startNextTrial() {
            reactionState = 'waiting'; reactionArea.className = 'state-wait'; reactionMainText.innerText = '기다리세요...';
            const randomDelay = Math.floor(Math.random() * 3000) + 2000;
            reactionTimeout = setTimeout(() => {
                reactionState = 'ready'; reactionArea.className = 'state-go'; reactionMainText.innerText = '지금 클릭!'; reactionStartTime = Date.now();
            }, randomDelay);
        }

        function handleReactionClick() {
            if (reactionState === 'idle') { startNextTrial(); }
            else if (reactionState === 'waiting') {
                clearTimeout(reactionTimeout); reactionState = 'showing_result'; reactionArea.className = ''; reactionMainText.innerText = '너무 빨랐습니다!';
                setTimeout(() => { if (reactionState !== 'idle') startNextTrial(); }, 1200);
            } else if (reactionState === 'ready') {
                const reactionTime = Date.now() - reactionStartTime; reactionTimes.push(reactionTime); trialCount++;
                reactionResult.innerText = `진행 상황: ${trialCount} / ${maxTrials}`;
                if (trialCount < maxTrials) {
                    reactionState = 'showing_result'; reactionArea.className = ''; reactionMainText.innerText = `${reactionTime} ms`;
                    setTimeout(() => { if (reactionState !== 'idle') startNextTrial(); }, 1000);
                } else {
                    reactionState = 'finished';
                    const sum = reactionTimes.reduce((a, b) => a + b, 0); const average = Math.round(sum / maxTrials);
                    reactionArea.className = 'state-finish'; reactionMainText.innerText = `검사 완료!`;
                    reactionResult.innerHTML = `측정 완료 (7회)<br><span class="result-highlight">평균 반응 시간: ${average} ms</span>`;
                }
            }
        }

        // 검사 2. 시각 탐색 과제 로직 (30초로 변경)
        let searchInterval, searchScore = 0, errorCount = 0, totalSearchTime = 0, lastTargetGenTime = 0, isSearchActive = false;
        const chars = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'K', 'L', 'M', 'N', 'P', 'Q', 'R', 'S', 'T', 'U', 'V', 'W', 'X', 'Y', 'Z', '1', '2', '3', '4', '5', '6', '7', '8', '9', '!', '@', '#', '$', '%', '^', '&', '*', '?', '♥', '★', '◆'];

        function resetSearchTest() {
            clearInterval(searchInterval); isSearchActive = false;
            document.getElementById('search-grid').innerHTML = '';
            document.getElementById('search-target-display').style.display = 'none';
            document.getElementById('search-status').innerText = '정답: 0 | 오류: 0 | 남은 시간: 30초';
            document.getElementById('btn-search').disabled = false;
        }

        function generateSearchGrid() {
            const grid = document.getElementById('search-grid'); grid.innerHTML = ''; let cellChars = [];
            currentTargetChar = chars[Math.floor(Math.random() * chars.length)];
            document.getElementById('target-char').innerText = currentTargetChar; cellChars.push(currentTargetChar);
            while (cellChars.length < 36) {
                let randomChar = chars[Math.floor(Math.random() * chars.length)];
                if (randomChar !== currentTargetChar) cellChars.push(randomChar);
            }
            cellChars.sort(() => Math.random() - 0.5); lastTargetGenTime = Date.now();
            cellChars.forEach(char => {
                const div = document.createElement('div'); div.className = 'search-cell'; div.innerText = char;
                div.onclick = () => {
                    if (!isSearchActive) return;
                    if (char === currentTargetChar) {
                        totalSearchTime += (Date.now() - lastTargetGenTime); searchScore++;
                        updateSearchStatus(30); generateSearchGrid();
                    } else { errorCount++; updateSearchStatus(); }
                };
                grid.appendChild(div);
            });
        }

        function updateSearchStatus(timeLeft) {
            const statusBox = document.getElementById('search-status');
            const displayTime = timeLeft !== undefined ? timeLeft : statusBox.innerText.split('남은 시간: ')[1].replace('초', '');
            statusBox.innerText = `정답: ${searchScore} | 오류: ${errorCount} | 남은 시간: ${displayTime}초`;
        }

        function startSearchTest() {
            let timeLeft = 30; searchScore = 0; errorCount = 0; totalSearchTime = 0; isSearchActive = true;
            document.getElementById('btn-search').disabled = true;
            document.getElementById('search-target-display').style.display = 'inline-block';
            updateSearchStatus(timeLeft); generateSearchGrid();

            searchInterval = setInterval(() => {
                timeLeft--; updateSearchStatus(timeLeft);
                if (timeLeft <= 0) {
                    clearInterval(searchInterval); isSearchActive = false;
                    document.getElementById('btn-search').disabled = false; document.getElementById('search-grid').innerHTML = ''; document.getElementById('search-target-display').style.display = 'none';
                    const avgSearchTime = searchScore > 0 ? (totalSearchTime / searchScore / 1000).toFixed(2) : 0;
                    alert(`검사 종료!\n\n- 정답 수: ${searchScore}개\n- 오류 수: ${errorCount}개\n- 평균 탐색 시간: ${avgSearchTime}초`);
                    document.getElementById('search-status').innerHTML = `<b>검사 결과</b><br>정답: <span class="result-highlight">${searchScore}개</span> | 오류: <span class="result-highlight">${errorCount}개</span> | 평균 탐색 시간: <span class="result-highlight">${avgSearchTime}초</span>`;
                }
            }, 1000);
        }
    </script>
</body>
</html>
